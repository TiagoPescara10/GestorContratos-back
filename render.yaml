services:
  # Django Web Server
  - type: web
    name: gestor-contratos-api
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py shell < scripts/crear_cliente.py"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --worker-class gthread --threads 2 --timeout 120 --keep-alive 5"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: gestor-contratos-backend.onrender.com,onrender.com,*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-contratos-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://giordanoconti-gestorcontratos.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: dmnwbg0rj
      - key: CLOUDINARY_API_KEY
        value: 657551349873981
      - key: CLOUDINARY_API_SECRET
        value: Vtn6NIsLyhG5ncZdvkwB4aLOXGI
      - key: ANTHROPIC_API_KEY
        value: ""  # Completar con la API key de Anthropic antes del deploy

databases:
  - name: gestor-contratos-db
    databaseName: gestor_contratos
    user: postgres
